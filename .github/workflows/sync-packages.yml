name: Sync Tizen Community Packages

on:
  schedule:
    # 04:00 UTC daily — 05:00 CET (winter) / 06:00 CEST (summer) in Brussels
    - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      force:
        description: 'Force rebuild even if nothing has changed'
        type: boolean
        default: false

permissions:
  contents: write

env:
  TIZEN_STUDIO_VER: 4
  CERT_NAME: CommunityPack
  CERT_PASSWORD: 1234
  NODE_OPTIONS: --openssl-legacy-provider

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.check.outputs.has_changes }}
      changes_summary: ${{ steps.check.outputs.changes_summary }}
    steps:
      - uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl

      - name: Check upstream versions
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE: ${{ inputs.force }}
        run: |
          set -e
          STATE_FILE=".github/state/last_seen.json"
          mkdir -p .github/state
          [ -f "$STATE_FILE" ] || echo '{}' > "$STATE_FILE"
          old_state=$(cat "$STATE_FILE")
          new_state='{}'
          summary=""
          has_changes="false"

          api() {
            curl -fsSL -H "Authorization: Bearer $GH_TOKEN" \
              -H "Accept: application/vnd.github+json" "$@"
          }

          # --- Built-from-source repos (track branch HEAD) ---
          while IFS= read -r entry; do
            repo=$(echo "$entry" | jq -r '.key')
            branch=$(echo "$entry" | jq -r '.value.branch')
            sha=$(api "https://api.github.com/repos/$repo/commits/$branch" 2>/dev/null | jq -r '.sha // empty')
            if [ -z "$sha" ]; then
              echo "WARN: could not fetch HEAD for $repo@$branch — keeping previous state"
              prev=$(echo "$old_state" | jq -r --arg k "build:$repo@$branch" '.[$k] // empty')
              [ -n "$prev" ] && sha="$prev" || continue
            fi
            key="build:$repo@$branch"
            new_state=$(echo "$new_state" | jq --arg k "$key" --arg v "$sha" '. + {($k): $v}')
            old_val=$(echo "$old_state" | jq -r --arg k "$key" '.[$k] // empty')
            if [ "$old_val" != "$sha" ]; then
              summary="${summary}"$'\n'"- build $repo ($branch) → ${sha:0:7}"
              has_changes="true"
            fi
          done < <(jq -c 'to_entries[]' repos-build.json)

          # --- Release-based repos (track latest tag) ---
          while IFS= read -r entry; do
            repo=$(echo "$entry" | jq -r '.key')
            json=$(api "https://api.github.com/repos/$repo/releases/latest" 2>/dev/null || echo '')
            tag=$(echo "$json" | jq -r '.tag_name // empty')
            if [ -z "$tag" ]; then
              json=$(api "https://api.github.com/repos/$repo/releases?per_page=20" 2>/dev/null || echo '[]')
              tag=$(echo "$json" | jq -r '[.[] | select(.prerelease==true and .draft==false)][0].tag_name // empty')
            fi
            if [ -z "$tag" ]; then
              echo "WARN: no releases for $repo — keeping previous state"
              prev=$(echo "$old_state" | jq -r --arg k "release:$repo" '.[$k] // empty')
              [ -n "$prev" ] && tag="$prev" || continue
            fi
            key="release:$repo"
            new_state=$(echo "$new_state" | jq --arg k "$key" --arg v "$tag" '. + {($k): $v}')
            old_val=$(echo "$old_state" | jq -r --arg k "$key" '.[$k] // empty')
            if [ "$old_val" != "$tag" ]; then
              summary="${summary}"$'\n'"- release $repo → $tag"
              has_changes="true"
            fi
          done < <(jq -c '.releases | to_entries[]' repos-sync.json)

          # --- Direct URLs (fingerprint via ETag / Last-Modified / Content-Length) ---
          while IFS= read -r entry; do
            repo=$(echo "$entry" | jq -r '.key')
            url=$(echo "$entry" | jq -r '.value.url')
            headers=$(curl -fsSIL "$url" 2>/dev/null | tr -d '\r' || true)
            etag=$(echo "$headers" | grep -i '^etag:' | tail -n1 | cut -d: -f2- | sed 's/^ *//')
            lastmod=$(echo "$headers" | grep -i '^last-modified:' | tail -n1 | cut -d: -f2- | sed 's/^ *//')
            clen=$(echo "$headers" | grep -i '^content-length:' | tail -n1 | cut -d: -f2- | tr -d ' ')
            fingerprint="etag:${etag}|mod:${lastmod}|len:${clen}"
            if [ "$fingerprint" = "etag:|mod:|len:" ]; then
              echo "WARN: no fingerprint headers for $url — treating as changed"
              fingerprint="unknown:$(date +%s)"
            fi
            key="direct:$repo"
            new_state=$(echo "$new_state" | jq --arg k "$key" --arg v "$fingerprint" '. + {($k): $v}')
            old_val=$(echo "$old_state" | jq -r --arg k "$key" '.[$k] // empty')
            if [ "$old_val" != "$fingerprint" ]; then
              summary="${summary}"$'\n'"- direct $repo → $fingerprint"
              has_changes="true"
            fi
          done < <(jq -c '.direct | to_entries[]' repos-sync.json)

          if [ "$FORCE" = "true" ]; then
            echo "Force flag set — treating as changed"
            has_changes="true"
            summary="${summary}"$'\n'"(forced via workflow_dispatch)"
          fi

          echo "$new_state" | jq '.' > new_last_seen.json

          echo "--- new state ---"
          cat new_last_seen.json
          echo "--- summary ---"
          echo "${summary:-No changes.}"

          echo "has_changes=$has_changes" >> "$GITHUB_OUTPUT"
          {
            echo "changes_summary<<__END__"
            echo "${summary:-No changes.}"
            echo "__END__"
          } >> "$GITHUB_OUTPUT"

      - name: Upload candidate state
        if: steps.check.outputs.has_changes == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: last-seen-state
          path: new_last_seen.json

  prepare:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Restore Tizen SDK cache
        id: tizen-sdk-cache
        uses: actions/cache@v4
        with:
          path: tizen-studio
          key: tizen-web-sdk-4.0

      - name: Install base dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget zip git jq nodejs npm expect curl unzip

      - name: Install Tizen Studio Web CLI
        if: steps.tizen-sdk-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p tizen-studio
          curl -L -o tizen-installer \
            "https://github.com/PatrickSt1991/tizen-community-packages/releases/download/tizen-deps-5.5/web-cli_Tizen_Studio_4.0_ubuntu-64.bin"
          chmod +x tizen-installer
          ./tizen-installer --accept-license "$GITHUB_WORKSPACE/tizen-studio"
          rm tizen-installer
          chmod -R +x tizen-studio

      - name: Save SDK to cache
        if: steps.tizen-sdk-cache.outputs.cache-hit != 'true'
        uses: actions/cache/save@v4
        with:
          path: tizen-studio
          key: tizen-web-sdk-4.0

      - name: Create signing certificate
        run: |
          mkdir -p tizen-studio-data/keystore/author tizen-studio-data/profile
          ./tizen-studio/tools/ide/bin/tizen certificate \
            -a "$CERT_NAME" -p "$CERT_PASSWORD" \
            -c NL -s Community -ct World \
            -o "$CERT_NAME" -n "$CERT_NAME" \
            -e community@example.org -f "$CERT_NAME"
          ./tizen-studio/tools/ide/bin/tizen security-profiles add \
            -n "$CERT_NAME" \
            -a "./tizen-studio-data/keystore/author/${CERT_NAME}.p12" \
            -p "$CERT_PASSWORD"
          ./tizen-studio/tools/ide/bin/tizen cli-config \
            "profiles.path=./tizen-studio-data/profile/profiles.xml"

      - name: Create expect script
        run: |
          printf '%s\n' \
            '#!/usr/bin/expect -f' \
            'set timeout 300' \
            'set build_dir [lindex $argv 0]' \
            'spawn $env(TIZEN_PATH)/tools/ide/bin/tizen package -t wgt -s CommunityPack -- $build_dir' \
            'expect {' \
            '  "Author password:" { send "$env(CERT_PASSWORD)\r"; exp_continue }' \
            '  "Distributor1 password:" { send "$env(CERT_PASSWORD)\r"; exp_continue }' \
            '  eof' \
            '}' \
            > package.exp
          chmod +x package.exp

      - uses: actions/upload-artifact@v4
        with:
          name: tizen-studio-artifact
          path: tizen-studio/

      - uses: actions/upload-artifact@v4
        with:
          name: package-exp-artifact
          path: package.exp

  generate-matrix-build:
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.has_changes == 'true'
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          matrix=$(jq -c \
            '{include: [to_entries[] | {
              repo: .key,
              repo_id: (.key | gsub("/"; "-")),
              branch: .value.branch,
              project_path: (.value.project_path // "."),
              output_name: (.value.output_name // "")
            }]}' repos-build.json)
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  tizen-build:
    runs-on: ubuntu-latest
    needs: [prepare, generate-matrix-build]
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.generate-matrix-build.outputs.matrix).include }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: tizen-studio-artifact
          path: tizen-studio
      - uses: actions/download-artifact@v4
        with:
          name: package-exp-artifact
          path: .
      - name: Fix Tizen Studio permissions
        run: chmod -R +x tizen-studio
      - name: Install expect
        run: |
          sudo apt-get update
          sudo apt-get install -y expect
      - name: Build Tizen Web Project
        shell: bash
        env:
          TIZEN_PATH: ${{ github.workspace }}/tizen-studio
        run: |
          set -e
          mkdir -p build wgt_files
          cd build
          git clone --depth 1 --branch "${{ matrix.branch }}" "https://github.com/${{ matrix.repo }}.git"
          cd "$(basename "${{ matrix.repo }}")"
          cd "${{ matrix.project_path }}"
          echo "Building in: $(pwd)"
          "$TIZEN_PATH/tools/ide/bin/tizen" build-web
          echo "Packaging..."
          expect "$GITHUB_WORKSPACE/package.exp" "$(pwd)"
          actual=$(ls *.wgt | head -n 1)
          desired="${{ matrix.output_name }}"
          if [ -z "$desired" ] || [ "$desired" = "null" ]; then
            desired="$actual"
          fi
          cp "$actual" "$GITHUB_WORKSPACE/wgt_files/$desired"
      - uses: actions/upload-artifact@v4
        with:
          name: built-wgts-${{ matrix.repo_id }}
          path: wgt_files/

  external-downloads:
    runs-on: ubuntu-latest
    needs: tizen-build
    steps:
      - uses: actions/checkout@v4

      - name: Install jq & curl
        run: |
          sudo apt-get update
          sudo apt-get install -y jq curl git

      - name: Prepare folder
        run: mkdir -p external_wgts

      - name: Locate repos-sync.json
        id: config
        run: |
          if [ -f "repos-sync.json" ]; then
            echo "config=repos-sync.json" >> "$GITHUB_OUTPUT"
          elif [ -f ".github/workflows/repos-sync.json" ]; then
            echo "config=.github/workflows/repos-sync.json" >> "$GITHUB_OUTPUT"
          else
            echo "config=" >> "$GITHUB_OUTPUT"
          fi

      - name: Download release WGTs
        if: ${{ steps.config.outputs.config != '' }}
        run: |
          set -e
          CFG="${{ steps.config.outputs.config }}"
          repos=$(jq -r '.releases | to_entries[] | .key' "$CFG")

          for repo in $repos; do
            latest_api="https://api.github.com/repos/$repo/releases/latest"
            list_api="https://api.github.com/repos/$repo/releases?per_page=20"

            echo "Fetching release for $repo ..."

            # 1) Try /releases/latest (non-prerelease, non-draft).
            json=$(curl -fsSL "$latest_api" 2>/dev/null || echo '')

            # 2) Probe whether /latest actually gave us a usable URL.
            #    Note: relying on a count is fragile because `jq` on empty
            #    input exits 0 with no output, so the `|| echo 0` fallback
            #    never fires. Probing for an actual URL avoids that.
            probe_url=$(echo "$json" | jq -r '(.assets // [])[] | .browser_download_url // empty' 2>/dev/null | head -n 1 || echo '')

            # 3) Fall back to newest non-draft prerelease if /latest had nothing.
            if [ -z "$probe_url" ]; then
              echo "  No /latest assets for $repo, falling back to newest prerelease..."
              list_json=$(curl -fsSL "$list_api" 2>/dev/null || echo '[]')
              json=$(echo "$list_json" | jq '[.[] | select(.prerelease==true and .draft==false)][0]' 2>/dev/null || echo 'null')
            fi

            # Decide: new-style (.assets array) or legacy (.output_name single).
            has_assets=$(jq -r ".releases[\"$repo\"] | has(\"assets\")" "$CFG")

            if [ "$has_assets" = "true" ]; then
              # New style — iterate the configured assets array, match by exact name then regex.
              while IFS=$'\t' read -r match outname; do
                url=$(echo "$json" | jq -r --arg m "$match" \
                  '(.assets // [])[] | select(.name == $m) | .browser_download_url' 2>/dev/null | head -n 1)
                if [ -z "$url" ]; then
                  url=$(echo "$json" | jq -r --arg m "$match" \
                    '(.assets // [])[] | select(.name | test($m)) | .browser_download_url' 2>/dev/null | head -n 1)
                fi
                if [ -z "$url" ]; then
                  echo "ERROR: Asset matching '$match' not found in release for $repo"
                  echo "Available assets:"
                  echo "$json" | jq -r '(.assets // [])[] | .name' 2>/dev/null || echo "  (none)"
                  exit 1
                fi
                if [ -z "$outname" ] || [ "$outname" = "null" ]; then
                  outname="$(basename "$url")"
                fi
                echo "Downloading $url -> external_wgts/$outname"
                curl -L -o "external_wgts/$outname" "$url"
              done < <(jq -r ".releases[\"$repo\"].assets[] | [.match, (.output_name // \"\")] | @tsv" "$CFG")
            else
              # Legacy style — first non-empty URL across all assets (matches old behavior).
              outname=$(jq -r ".releases[\"$repo\"].output_name" "$CFG")
              url=$(echo "$json" | jq -r '(.assets // [])[] | .browser_download_url // empty' 2>/dev/null | head -n 1)
              if [ -z "$url" ]; then
                echo "ERROR: No release asset found for $repo (latest or prerelease)."
                exit 1
              fi
              if [ -z "$outname" ] || [ "$outname" = "null" ]; then
                outname="$(basename "$url")"
              fi
              echo "Downloading $url -> external_wgts/$outname"
              curl -L -o "external_wgts/$outname" "$url"
            fi
          done

      - name: Download direct WGT URLs
        if: ${{ steps.config.outputs.config != '' }}
        run: |
          CFG="${{ steps.config.outputs.config }}"
          jq -r '.direct | to_entries[] | "\(.key) \(.value.url // .value) \(.value.output_name // "")"' "$CFG" |
          while read repo url outname; do
            [ -n "$repo" ] || continue
            if [ -z "$outname" ] || [ "$outname" = "null" ]; then
              outname="${repo##*/}.wgt"
            fi
            curl -L -o "external_wgts/$outname" "$url"
          done

      - uses: actions/upload-artifact@v4
        with:
          name: external-wgts
          path: external_wgts/

  publish-release:
    runs-on: ubuntu-latest
    needs: [detect-changes, tizen-build, external-downloads]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: built-wgts-*
          path: built
      - uses: actions/download-artifact@v4
        with:
          name: external-wgts
          path: external

      - name: Merge all wgt files
        run: |
          mkdir -p final_wgts
          cp built/**/*.wgt final_wgts/ 2>/dev/null || true
          cp external/*.wgt final_wgts/ 2>/dev/null || true
          echo "Final WGT files:"
          ls -l final_wgts

      - name: Create and push release tag
        env:
          TAG: "community-${{ github.run_number }}"
        run: |
          set -e
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists on origin — reusing it."
          else
            git tag -a "$TAG" -m "Community Packages ${{ github.run_number }}"
            git push origin "$TAG"
          fi

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: "community-${{ github.run_number }}"
          name: "Community Packages ${{ github.run_number }}"
          target_commitish: ${{ github.sha }}
          files: "final_wgts/*.wgt"
          body: |
            Automated community bundle.

            **Changes since last bundle:**
            ${{ needs.detect-changes.outputs.changes_summary }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  update-state:
    runs-on: ubuntu-latest
    needs: [detect-changes, publish-release]
    if: success() && needs.detect-changes.outputs.has_changes == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          name: last-seen-state
          path: .state-download
      - name: Commit updated state
        run: |
          set -e
          mkdir -p .github/state
          mv .state-download/new_last_seen.json .github/state/last_seen.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .github/state/last_seen.json
          if git diff --cached --quiet; then
            echo "State unchanged — nothing to commit."
          else
            git commit -m "chore: update last_seen state [skip ci]"
            git push
          fi
